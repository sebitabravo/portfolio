name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit and smoke tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          pnpm dev --host 127.0.0.1 --port 4321 > /tmp/astro-dev.log 2>&1 &
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:4321 > /dev/null; then
              break
            fi
            sleep 1
          done
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4321 pnpm test:e2e

      - name: Validate project links
        run: pnpm validate:links

      - name: Build project
        run: pnpm build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
