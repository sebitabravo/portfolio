name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Type check
        run: pnpm astro check

      - name: Run unit and smoke tests
        run: pnpm test

      - name: Build project for E2E
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: |
          pnpm preview --host 127.0.0.1 --port 4321 > /tmp/astro-preview.log 2>&1 &
          PREVIEW_PID=$!
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:4321 > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "ERROR: Preview server failed to start after 30 attempts"
              cat /tmp/astro-preview.log
              exit 1
            fi
            sleep 1
          done
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4321 pnpm test:e2e
          kill $PREVIEW_PID 2>/dev/null || true

      - name: Validate project links
        run: pnpm validate:links

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
